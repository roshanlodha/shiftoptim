{% if summary %}
<h2 style="display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 2rem;">
  <i data-lucide="bar-chart-3" style="color: var(--accent); width: 24px; height: 24px;"></i>
  Shift Summary (This Half)
</h2>
<div class="table-scroll">
  <table class="summary">
    <thead>
      <tr>
        <th>Resident</th>
        <th>Assignment</th>
        {% for c in category_columns %}
          <th class="num" style="text-align: right;">{{ c }}</th>
        {% endfor %}
        <th class="num" style="text-align: right; background-color: rgba(244, 114, 182, 0.1);">Total</th>
      </tr>
    </thead>
    <tbody>
      {% for row in summary %}
      <tr>
        <td style="font-weight: 700;">{{ row.full_name }}</td>
        <td style="font-weight: 500; color: var(--muted-foreground);">{{ row.assignment }}</td>
        {% for c in category_columns %}
          <td class="num" style="text-align: right;">{{ row.totals[c] }}</td>
        {% endfor %}
        <td class="num" style="text-align: right; font-weight: 800; background-color: rgba(244, 114, 182, 0.05); color: var(--secondary);">
          {{ row.total }}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endif %}
