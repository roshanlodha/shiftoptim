{% extends "base.html" %}
{% block title %}Solver settings{% endblock %}
{% block content %}
<h1>Balance weights</h1>
<div class="card-sticker featured" style="max-width: 550px; margin-top: 1.5rem;">
  <div class="card-icon-badge accent-badge">
    <i data-lucide="sliders" style="width: 22px; height: 22px; color: white;"></i>
  </div>
  
  <form method="post" class="settings-form" style="max-width: 100%;">
    <table class="settings" style="margin-top: 0.5rem; box-shadow: none;">
      <thead>
        <tr>
          <th>Category</th>
          <th style="text-align: center; width: 260px;">Weight</th>
        </tr>
      </thead>
      <tbody>
        {% for cat in categories %}
        <tr>
          <td style="font-weight: 700; font-size: 1rem; color: var(--foreground); vertical-align: middle;">{{ cat }}</td>
          <td style="text-align: center; width: 260px; vertical-align: middle;">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <input type="range" name="{{ cat }}" value="{{ weights[cat] }}" min="0" max="1000" oninput="this.nextElementSibling.value = this.value" style="flex: 1; accent-color: var(--accent); cursor: pointer; height: 6px; padding: 0; margin: 0;">
              <output style="font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.1rem; width: 3rem; text-align: right; color: var(--accent); display: inline-block;">{{ weights[cat] }}</output>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    
    <button type="submit" style="width: 100%; margin-top: 1rem;">
      Save Settings <i data-lucide="save" style="width: 18px; height: 18px;"></i>
    </button>
  </form>
</div>
{% endblock %}
