{% extends "base.html" %}
{% block title %}Time off{% endblock %}
{% block content %}
<h1>Time off requests</h1>
<p><a href="{{ url_for('admin_dashboard') }}">&larr; Dashboard</a></p>

<form method="post" class="inline-form">
  <input type="hidden" name="action" value="add">
  <select name="resident_id" required>
    {% for res in residents %}<option value="{{ res.id }}">{{ res.full_name }}</option>{% endfor %}
  </select>
  <input type="date" name="start_date" required>
  <input type="date" name="end_date" required>
  <button type="submit">Add</button>
</form>

<table class="time-off">
  <tr><th>Resident</th><th>Start</th><th>End</th><th></th></tr>
  {% for t in time_off %}
  <tr>
    <td>{{ t.full_name }}</td>
    <td>{{ t.start_date }}</td>
    <td>{{ t.end_date }}</td>
    <td>
      <form method="post" class="inline-form">
        <input type="hidden" name="action" value="delete">
        <input type="hidden" name="time_off_id" value="{{ t.id }}">
        <button type="submit">Remove</button>
      </form>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
