<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ShiftOptim{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('index') }}">
      ShiftOptim
    </a>
    {% if g.user %}
      <nav>
        {% if g.user.role == 'admin' %}
          <a href="{{ url_for('admin_dashboard') }}"><i data-lucide="layout-dashboard" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Dashboard</a>
          <a href="{{ url_for('admin_audit') }}"><i data-lucide="file-check" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Audit</a>
          <a href="{{ url_for('admin_settings') }}"><i data-lucide="settings" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Settings</a>
        {% else %}
          <a href="{{ url_for('resident_schedule') }}"><i data-lucide="calendar" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Schedule</a>
          <a href="{{ url_for('resident_timeoff') }}"><i data-lucide="clock" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Time off</a>
          <a href="{{ url_for('resident_history') }}"><i data-lucide="history" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> My history</a>
          <a href="{{ url_for('resident_settings') }}"><i data-lucide="settings" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Settings</a>
        {% endif %}
        <span class="who">{{ g.user.username }}</span>
        <a href="{{ url_for('logout') }}"><i data-lucide="log-out" style="display: inline-block; vertical-align: middle; width: 18px; height: 18px; margin-right: 4px;"></i> Log out</a>
      </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    lucide.createIcons({
      attrs: {
        'stroke-width': 2.5,
        'stroke-linecap': 'round',
        'stroke-linejoin': 'round'
      }
    });
  </script>
</body>
</html>
