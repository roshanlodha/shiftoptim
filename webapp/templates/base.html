<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}ShiftOptim{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <a class="brand" href="{{ url_for('index') }}">ShiftOptim</a>
    {% if g.user %}
      <nav>
        {% if g.user.role == 'admin' %}
          <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
          <a href="{{ url_for('admin_audit') }}">Audit</a>
        {% else %}
          <a href="{{ url_for('resident_schedule') }}">Schedule</a>
          <a href="{{ url_for('resident_timeoff') }}">Time off</a>
          <a href="{{ url_for('resident_history') }}">My history</a>
        {% endif %}
        <span class="who">{{ g.user.username }}</span>
        <a href="{{ url_for('logout') }}">Log out</a>
      </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
