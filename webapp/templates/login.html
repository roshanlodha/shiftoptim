{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="card-sticker login-card featured">
  <div class="card-icon-badge pink-badge">
    <i data-lucide="lock" style="width: 24px; height: 24px; color: #1E293B;"></i>
  </div>
  <h1>Log in</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" name="username" autofocus required placeholder="e.g. jaba">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required placeholder="••••••••">
    </div>
    <button type="submit">
      Log in <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
    </button>
  </form>
</div>
{% endblock %}
